name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Build web app
        run: flutter build web --release --base-href "/EMtools/app/"

      - name: Assemble deploy directory
        run: |
          mkdir deploy
          # Landing page + assets at root
          cp docs/index.html deploy/
          cp docs/logo.png deploy/
          cp docs/logo.svg deploy/
          cp docs/.nojekyll deploy/
          cp docs/LICENSE deploy/
          # Wiki docs
          cp -r docs/wiki deploy/wiki
          # Flutter web app under /app
          cp -r build/web deploy/app

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'deploy'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
