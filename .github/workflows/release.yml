name: Release

on:
  push:
    branches: [master, main]
    paths-ignore:
      - '**.md'
      - '.github/**'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./frontend/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          body: |
            ## 🚀 EMTools v${{ steps.version.outputs.version }}
            
            ### What's New
            - See commit history for details
            
            ### Docker Images
            ```bash
            docker pull ghcr.io/${{ github.repository }}-frontend:${{ steps.version.outputs.version }}
            docker pull ghcr.io/${{ github.repository }}-backend:${{ steps.version.outputs.version }}
            ```
            
            ### Quick Start
            ```bash
            git clone https://github.com/${{ github.repository }}.git
            cd EMtools
            docker-compose up -d
            ```
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, 'alpha') || contains(steps.version.outputs.version, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
