# ================================
# EMTOOLS - Production Docker Compose
# ================================
# Usage:
#   docker-compose -f docker-compose.prod.yml up -d
#   
# Before deploying:
#   1. Copy .env.example to .env and configure all values
#   2. Generate a strong SECRET_KEY
#   3. Set strong admin password
#   4. Configure MongoDB authentication
# ================================

version: '3.8'

services:
  # ================================
  # MongoDB Database
  # ================================
  mongodb:
    image: mongo:7.0
    container_name: emtools-mongodb-prod
    restart: always
    ports:
      - "127.0.0.1:27017:27017"  # Only localhost access
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD is required}
      MONGO_INITDB_DATABASE: ${MONGODB_DB_NAME:-emtools}
    networks:
      - emtools-internal
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # ================================
  # FastAPI Backend
  # ================================
  backend:
    image: ${DOCKER_REGISTRY:-emtools}/backend:${VERSION:-1.0.0-alpha}
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: emtools-backend-prod
    restart: always
    expose:
      - "8000"
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
      - MONGODB_URL=mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD}@mongodb:27017
      - MONGODB_DB_NAME=${MONGODB_DB_NAME:-emtools}
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required}
      - FIRST_SUPERUSER_EMAIL=${ADMIN_EMAIL:-admin@emtools.com}
      - FIRST_SUPERUSER_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      - BACKEND_CORS_ORIGINS=${CORS_ORIGINS:-["https://emtools.com"]}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      - REFRESH_TOKEN_EXPIRE_DAYS=${REFRESH_TOKEN_EXPIRE_DAYS:-7}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - emtools-internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ================================
  # Nginx Frontend
  # ================================
  frontend:
    image: ${DOCKER_REGISTRY:-emtools}/frontend:${VERSION:-1.0.0-alpha}
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: emtools-frontend-prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - emtools-internal
      - emtools-external
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # Uncomment for SSL with Let's Encrypt
    # volumes:
    #   - ./ssl/certs:/etc/nginx/certs:ro
    #   - ./ssl/private:/etc/nginx/private:ro

# ================================
# Volumes
# ================================
volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local

# ================================
# Networks
# ================================
networks:
  emtools-internal:
    driver: bridge
    internal: true  # No external access
  emtools-external:
    driver: bridge
