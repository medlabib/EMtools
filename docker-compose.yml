version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: emtools-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=emtools
    networks:
      - emtools-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: emtools-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - MONGODB_DB_NAME=emtools
      - SECRET_KEY=your-super-secret-key-change-in-production
      - FIRST_SUPERUSER_EMAIL=admin@emtools.com
      - FIRST_SUPERUSER_PASSWORD=admin123
    depends_on:
      - mongodb
    networks:
      - emtools-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: emtools-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - emtools-network

volumes:
  mongodb_data:

networks:
  emtools-network:
    driver: bridge
